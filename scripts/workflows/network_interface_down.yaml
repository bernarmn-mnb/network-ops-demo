name: Network Interface Down — CDP/LLDP Crawl
enabled: true
description: Triggered by interface-down syslog events. Queries affected device syslogs, checks existing CDP/LLDP topology, then uses AI to assess downstream impact and recommended actions.
tags: ["network", "interface", "cdp", "lldp", "topology", "event-driven"]

triggers:
  - type: manual

inputs:
  - name: device_id
    type: string
    required: true
  - name: interface_name
    type: string
    required: true

steps:
  - name: get_interface_events
    type: elasticsearch.search
    with:
      index: network-syslog
      query:
        bool:
          must:
            - match:
                device_id: "{{ inputs.device_id }}"
          filter:
            - range:
                "@timestamp":
                  gte: "now-15m"
      size: 10

  - name: get_existing_topology
    type: elasticsearch.search
    with:
      index: cdp_lldp
      query:
        bool:
          must:
            - match:
                local_device: "{{ inputs.device_id }}"
      size: 20

  - name: get_down_links
    type: elasticsearch.search
    with:
      index: cdp_lldp
      query:
        bool:
          must:
            - match:
                local_device: "{{ inputs.device_id }}"
            - match:
                link_status: "down"
      size: 10

  - name: ai_topology_impact
    type: ai.agent
    with:
      agent_id: "network-agent"
      message: "An interface-down event was detected on device {{ inputs.device_id }}, interface {{ inputs.interface_name }}. Context: {{ steps.get_interface_events.output.hits.total.value }} syslog events in the last 15 minutes, {{ steps.get_existing_topology.output.hits.total.value }} known CDP/LLDP adjacencies for this device, {{ steps.get_down_links.output.hits.total.value }} adjacencies currently showing link_status=down. Assess: 1) Which downstream devices or services are now unreachable, 2) Is this a physical link failure or a protocol issue, 3) Recommended immediate actions, 4) Which network segments are impacted."

  - name: log_crawl
    type: console
    with:
      message: "INTERFACE DOWN — {{ inputs.device_id }}/{{ inputs.interface_name }}: {{ steps.get_interface_events.output.hits.total.value }} syslog events, {{ steps.get_existing_topology.output.hits.total.value }} adjacencies checked, {{ steps.get_down_links.output.hits.total.value }} links down. AI impact: {{ steps.ai_topology_impact.output.message }}"
