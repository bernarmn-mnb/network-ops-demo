name: Traffic Analysis
enabled: true
description: Search network flows for a device, IP, or protocol, then use AI to recommend security or capacity actions based on the traffic patterns.
tags: ["network", "traffic", "recommendation", "analysis"]

triggers:
  - type: manual

inputs:
  - name: query
    type: string
    required: true

steps:
  - name: search_flows
    type: elasticsearch.search
    with:
      index: network-flows
      query:
        bool:
          should:
            - match:
                src_ip: "{{ inputs.query }}"
            - match:
                device_id: "{{ inputs.query }}"
            - match:
                protocol: "{{ inputs.query }}"
      size: 10

  - name: ai_recommendation
    type: ai.agent
    with:
      agent_id: "network-agent"
      message: "Analyse network traffic for query '{{ inputs.query }}'. Found {{ steps.search_flows.output.hits.total.value }} flow records. Provide: 1) A summary of the traffic behaviour, 2) Any security or performance concerns, 3) Recommended actions for the NOC team."

  - name: log_recommendation
    type: console
    with:
      message: "TRAFFIC ANALYSIS for '{{ inputs.query }}': {{ steps.search_flows.output.hits.total.value }} flows. AI: {{ steps.ai_recommendation.output.message }}"
