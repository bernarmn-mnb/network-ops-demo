# Nginx config for Cloud Run all-in-one deployment
# Used with Dockerfile.cloudrun (supervisor runs Nginx + FastAPI together)
#
# IMPORTANT: Update the base path to match your deployment

server {
    listen 8080;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # 1. Frontend: Serve React App (SPA)
    # Handle root path
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }

    # Handle /template/ path explicitly (if app is deployed there)
    location /template/ {
        alias /usr/share/nginx/html/;
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }

    # 2. Backend: Proxy /api requests to FastAPI (running on localhost:8000)
    # Handle /api/ directly
    location /api/ {
        proxy_pass http://127.0.0.1:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_connect_timeout 5s;
        proxy_read_timeout 60s;
        
        # Pass IAP headers through to backend
        proxy_set_header X-Goog-Authenticated-User-Email $http_x_goog_authenticated_user_email;
        
        # Return JSON errors when backend is unavailable
        proxy_intercept_errors on;
        error_page 502 503 504 = @backend_error;
    }

    # Handle /template/api/ (strip prefix)
    location /template/api/ {
        proxy_pass http://127.0.0.1:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_connect_timeout 5s;
        proxy_read_timeout 60s;
        
        # Pass IAP headers through to backend
        proxy_set_header X-Goog-Authenticated-User-Email $http_x_goog_authenticated_user_email;
        
        # Return JSON errors when backend is unavailable
        proxy_intercept_errors on;
        error_page 502 503 504 = @backend_error;
    }
    
    # JSON error response for API proxy failures
    location @backend_error {
        default_type application/json;
        return 503 '{"error": "Backend service unavailable", "detail": "The FastAPI backend is not responding. Check logs for startup errors."}';
    }

    # 3. Health Check (for Cloud Run)
    location /health {
        proxy_pass http://127.0.0.1:8000/health;
        access_log off;
    }
}
