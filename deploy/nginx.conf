server {
    listen 8080;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    location = / {
        return 302 /noc/;
    }

    location = /noc {
        return 302 /noc/;
    }

    location /noc/ {
        alias /usr/share/nginx/html/;
        try_files $uri $uri/ /noc/index.html;
        add_header Cache-Control "no-cache";
    }

    location /api/ {
        proxy_pass http://localhost:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_read_timeout 60s;
        proxy_set_header X-Goog-Authenticated-User-Email $http_x_goog_authenticated_user_email;
        proxy_intercept_errors on;
        error_page 502 503 504 = @backend_error;
    }

    location /noc/api/ {
        proxy_pass http://localhost:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_read_timeout 60s;
        proxy_set_header X-Goog-Authenticated-User-Email $http_x_goog_authenticated_user_email;
        proxy_intercept_errors on;
        error_page 502 503 504 = @backend_error;
    }

    location @backend_error {
        default_type application/json;
        return 503 '{"error":"Backend unavailable"}';
    }

    location = /health {
        proxy_pass http://localhost:8000/health;
        access_log off;
    }

    location /v1/traces {
        proxy_pass http://localhost:4318/v1/traces;
        proxy_http_version 1.1;
    }

    location /noc/v1/traces {
        proxy_pass http://localhost:4318/v1/traces;
        proxy_http_version 1.1;
    }
}
