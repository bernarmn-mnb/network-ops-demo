# Nginx config for Cloud Run sidecar deployment
# Serves frontend at configurable base path
# Proxies to FastAPI and OTel collector running as sidecars on localhost
#
# IMPORTANT: Update the base path (e.g., /ecommerce/, /my-demo/) to match your deployment

server {
    listen 8080;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # ============================================================
    # CONFIGURE YOUR BASE PATH HERE
    # Change /template/ to your app's path (e.g., /ecommerce/, /chat/)
    # ============================================================

    # Redirect root to your base path
    location = / {
        return 302 /template/;
    }

    # Redirect /template (no trailing slash) to /template/
    location = /template {
        return 302 /template/;
    }

    # Frontend: Serve React SPA at base path
    # The built assets reference /template/assets/... so we need to serve them
    location /template/ {
        alias /usr/share/nginx/html/;
        try_files $uri $uri/ /template/index.html;
        add_header Cache-Control "no-cache";
    }

    # API: Proxy to FastAPI sidecar (running on localhost:8000)
    # Supports both /api/ and /template/api/ paths
    location /api/ {
        proxy_pass http://localhost:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_read_timeout 60s;
        
        # Pass IAP headers (for authenticated user)
        proxy_set_header X-Goog-Authenticated-User-Email $http_x_goog_authenticated_user_email;
        
        # Return JSON errors when backend is unavailable (not HTML)
        proxy_intercept_errors on;
        error_page 502 503 504 = @backend_error;
    }

    location /template/api/ {
        proxy_pass http://localhost:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_read_timeout 60s;
        
        # Pass IAP headers
        proxy_set_header X-Goog-Authenticated-User-Email $http_x_goog_authenticated_user_email;
        
        # Return JSON errors when backend is unavailable
        proxy_intercept_errors on;
        error_page 502 503 504 = @backend_error;
    }
    
    # JSON error response for API proxy failures
    # Prevents "Unexpected token '<'" errors in frontend when backend is unavailable
    location @backend_error {
        default_type application/json;
        return 503 '{"error": "Backend service unavailable", "detail": "The FastAPI backend is not responding. Check Cloud Run logs for container startup errors."}';
    }

    # Health check for Cloud Run (at root level)
    location = /health {
        proxy_pass http://localhost:8000/health;
        access_log off;
    }

    # OTel Collector: Proxy browser traces (with CORS)
    # Supports both /v1/traces and /demo/v1/traces
    location /v1/traces {
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' '*';
            add_header 'Access-Control-Allow-Methods' 'POST, OPTIONS';
            add_header 'Access-Control-Allow-Headers' 'Content-Type, traceparent, tracestate';
            add_header 'Access-Control-Max-Age' 7200;
            add_header 'Content-Length' 0;
            return 204;
        }
        
        add_header 'Access-Control-Allow-Origin' '*' always;
        proxy_pass http://localhost:4318/v1/traces;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location /template/v1/traces {
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' '*';
            add_header 'Access-Control-Allow-Methods' 'POST, OPTIONS';
            add_header 'Access-Control-Allow-Headers' 'Content-Type, traceparent, tracestate';
            add_header 'Access-Control-Max-Age' 7200;
            add_header 'Content-Length' 0;
            return 204;
        }
        
        add_header 'Access-Control-Allow-Origin' '*' always;
        proxy_pass http://localhost:4318/v1/traces;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
}
