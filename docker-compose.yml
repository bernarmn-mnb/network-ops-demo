version: '3.8'

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: always

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      - PORT=8000
      - HOST=0.0.0.0
      # CORS needed for browser-to-backend calls if direct
      - CORS_ORIGINS=http://localhost:3000,http://127.0.0.1:3000
    restart: always

networks:
  default:
    driver: bridge

