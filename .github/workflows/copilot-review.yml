# Copilot Code Review
# Automatically requests Copilot review on all PRs
# https://docs.github.com/en/copilot/using-github-copilot/code-review/using-copilot-code-review

name: Copilot Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  copilot-review:
    name: Request Copilot Review
    runs-on: ubuntu-latest
    
    steps:
      - name: Request Copilot Review
        uses: actions/github-script@v7
        with:
          script: |
            // Request Copilot as a reviewer
            // Note: This requires Copilot code review to be enabled for the repo
            try {
              await github.rest.pulls.requestReviewers({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: context.payload.pull_request.number,
                reviewers: ['copilot']
              });
              console.log('✅ Copilot review requested');
            } catch (error) {
              // Copilot review may not be available for all repos
              console.log('ℹ️ Could not request Copilot review:', error.message);
              console.log('Make sure Copilot code review is enabled in repo settings.');
            }

